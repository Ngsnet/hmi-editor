<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Vnější obrys budovy - basement -->
  <rect x="50" y="50" width="900" height="700" fill="#eaeae5" stroke="#999" stroke-width="3"/>

  <!-- Chodba -->
  <rect id="corridor-bl" x="100" y="350" width="800" height="80"
        fill="#e0e0d8" stroke="#ccc" stroke-width="1"/>
  <text x="500" y="395" text-anchor="middle" fill="#aaa" font-size="14" font-family="sans-serif">CHODBA</text>

  <!-- Technické místnosti -->
  <rect id="technical-01" x="100" y="80" width="250" height="250"
        fill="#f0f0f0" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="210" text-anchor="middle" fill="#888" font-size="13" font-family="sans-serif">Kotelna</text>

  <rect id="technical-02" x="380" y="80" width="250" height="250"
        fill="#f0f0f0" stroke="#bbb" stroke-width="1.5"/>
  <text x="505" y="210" text-anchor="middle" fill="#888" font-size="13" font-family="sans-serif">Rozvodna</text>

  <rect id="technical-03" x="660" y="80" width="240" height="250"
        fill="#f0f0f0" stroke="#bbb" stroke-width="1.5"/>
  <text x="780" y="210" text-anchor="middle" fill="#888" font-size="13" font-family="sans-serif">Vzduchotechnika</text>

  <!-- Sklady -->
  <rect id="wall-storage-1" x="100" y="450" width="350" height="250"
        fill="#f5f5f0" stroke="#bbb" stroke-width="1.5"/>
  <text x="275" y="580" text-anchor="middle" fill="#888" font-size="13" font-family="sans-serif">Sklad 1</text>

  <rect id="wall-storage-2" x="480" y="450" width="420" height="250"
        fill="#f5f5f0" stroke="#bbb" stroke-width="1.5"/>
  <text x="690" y="580" text-anchor="middle" fill="#888" font-size="13" font-family="sans-serif">Sklad 2</text>

  <!-- Schodiště -->
  <rect id="stairs-bl-1" x="100" y="340" width="60" height="100"
        fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="130" y="395" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif" transform="rotate(-90 130 395)">SCHODY</text>

  <rect id="stairs-bl-2" x="840" y="340" width="60" height="100"
        fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="870" y="395" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif" transform="rotate(-90 870 395)">SCHODY</text>
</svg>
