<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Vnější obrys budovy - Level 1 -->
  <rect x="50" y="50" width="900" height="700" fill="#f5f5f0" stroke="#999" stroke-width="3"/>

  <!-- Chodba horní -->
  <rect id="corridor-l1-top" x="100" y="180" width="800" height="80"
        fill="#e8e8e0" stroke="#ccc" stroke-width="1"/>
  <text x="500" y="225" text-anchor="middle" fill="#aaa" font-size="14" font-family="sans-serif">CHODBA</text>

  <!-- Chodba dolní -->
  <rect id="corridor-l1-bottom" x="100" y="440" width="800" height="80"
        fill="#e8e8e0" stroke="#ccc" stroke-width="1"/>
  <text x="500" y="485" text-anchor="middle" fill="#aaa" font-size="14" font-family="sans-serif">CHODBA</text>

  <!-- Obchodní jednotky – horní řada -->
  <rect id="unit-11" x="100" y="70" width="260" height="100"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="230" y="125" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Zara</text>

  <rect id="unit-12" x="380" y="70" width="200" height="100"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="480" y="125" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Reserved</text>

  <rect id="unit-13" x="600" y="70" width="280" height="100"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="740" y="125" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">CCC</text>

  <!-- Obchodní jednotky – dolní řada -->
  <rect id="unit-14" x="100" y="530" width="200" height="170"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="200" y="620" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Lékárna</text>

  <rect id="unit-15" x="320" y="530" width="180" height="170"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="410" y="620" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Optika</text>

  <rect id="unit-16" x="520" y="530" width="180" height="170"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="610" y="620" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Volná</text>

  <rect id="unit-17" x="720" y="530" width="180" height="170"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="810" y="620" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Knihy</text>

  <!-- Atrium uprostřed -->
  <rect id="corridor-atrium" x="200" y="280" width="600" height="140"
        fill="#e0ece8" stroke="#aaa" stroke-width="1"/>
  <text x="500" y="355" text-anchor="middle" fill="#888" font-size="14" font-family="sans-serif">ATRIUM</text>

  <!-- Schodiště -->
  <rect id="stairs-l1-1" x="100" y="280" width="60" height="140"
        fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <text x="130" y="355" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif" transform="rotate(-90 130 355)">SCHODY</text>

  <rect id="stairs-l1-2" x="840" y="280" width="60" height="140"
        fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <text x="870" y="355" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif" transform="rotate(-90 870 355)">SCHODY</text>
</svg>
