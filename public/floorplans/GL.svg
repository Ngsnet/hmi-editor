<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Vnější obrys budovy -->
  <rect x="50" y="50" width="900" height="700" fill="#f5f5f0" stroke="#999" stroke-width="3"/>

  <!-- Chodba horní -->
  <rect id="corridor-top" x="100" y="180" width="800" height="80"
        fill="#e8e8e0" stroke="#ccc" stroke-width="1"/>
  <text x="500" y="225" text-anchor="middle" fill="#aaa" font-size="14" font-family="sans-serif">CHODBA</text>

  <!-- Chodba dolní -->
  <rect id="corridor-bottom" x="100" y="440" width="800" height="80"
        fill="#e8e8e0" stroke="#ccc" stroke-width="1"/>
  <text x="500" y="485" text-anchor="middle" fill="#aaa" font-size="14" font-family="sans-serif">CHODBA</text>

  <!-- Obchodní jednotky – horní řada -->
  <rect id="unit-01" x="100" y="70" width="180" height="100"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="190" y="125" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Nike</text>

  <rect id="unit-02" x="300" y="70" width="180" height="100"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="390" y="125" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Puma</text>

  <rect id="unit-03" x="500" y="70" width="180" height="100"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="590" y="125" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Volná</text>

  <rect id="unit-04" x="700" y="70" width="180" height="100"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="790" y="125" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Starbucks</text>

  <!-- Obchodní jednotky – dolní řada -->
  <rect id="unit-05" x="100" y="530" width="240" height="170"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="220" y="620" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">H&amp;M</text>

  <rect id="unit-06" x="370" y="530" width="240" height="170"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="490" y="620" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Kadeřnictví</text>

  <rect id="unit-07" x="640" y="530" width="240" height="170"
        fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="760" y="620" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Elektro-tech</text>

  <!-- Vstup -->
  <rect id="entrance-main" x="420" y="740" width="160" height="20"
        fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="500" y="755" text-anchor="middle" fill="#28a745" font-size="11" font-family="sans-serif">VSTUP</text>

  <!-- Schodiště -->
  <rect id="stairs-1" x="100" y="280" width="60" height="140"
        fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <text x="130" y="355" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif" transform="rotate(-90 130 355)">SCHODY</text>

  <rect id="stairs-2" x="840" y="280" width="60" height="140"
        fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <text x="870" y="355" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif" transform="rotate(-90 870 355)">SCHODY</text>
</svg>
